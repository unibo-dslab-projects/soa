          initialView: "timeGridWeek",
          initialDate: "2026-07-06",
          slotMinTime: "09:00:00",
          slotMaxTime: "23:00:00",
          locale: "en-GB",
          slotLabelFormat: {
            hour: "2-digit",
            minute: "2-digit",
            hour12: false,
          },
          contentHeight: "auto",
          allDaySlot: false,
          events: events,
          headerToolbar: {
            left: "timeGridDay,timeGridWeek,dayGridMonth",
            center: "title",
            right: "prev,next today",
          },
          buttonText: {
            today: "Today",
            timeGridDay: "Day",
            timeGridWeek: "Week",
            dayGridMonth: "Month",
          },
          eventClassNames: function (arg) {
            let type = arg.event.extendedProps.eventType;
            if (!type) return [];
            if (type.toLowerCase().startsWith('lab')) return ['project'];
            return [type];
          },
          eventContent: function (arg) {
            let html = '<div class="h-full overflow-y-auto flex flex-col p-1">';
            if (arg.timeText) {
              html += `<div class="fc-event-time font-semibold text-xs mb-0.5">${arg.timeText}</div>`;
            }
            html += `<div class="fc-event-title font-bold text-sm leading-tight">${arg.event.title}</div>`;
            
            if (arg.event.extendedProps.people) {
              html += `<div class="fc-event-people text-xs mt-1 opacity-90"><span class="font-semibold">Who:</span> ${arg.event.extendedProps.people}</div>`;
            }
            
            if (arg.event.extendedProps.location) {
              html += `<div class="fc-event-location text-xs mt-1 opacity-90"><span class="font-semibold">📍</span> ${arg.event.extendedProps.location}</div>`;
            }
            html += '</div>';
            
            return { html: html };
          },
          eventDidMount: function (info) {
            const link = info.event.extendedProps.link || info.event.url;
            if (link) {
              const el = info.el.querySelector(".fc-event-title");
              if (el) {
                el.style.textDecoration = "underline";
              }
              info.el.style.cursor = "pointer";
            }
          },
          eventClick: function (info) {
            const link = info.event.extendedProps.link || info.event.url;
            if (link) {
              info.jsEvent.preventDefault();
              window.open(link, "_blank");
            }
          },
        });

        calendar.render();
      });
